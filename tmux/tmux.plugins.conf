# =====================================
# ===        Renew environment      ===
# =====================================
set -g update-environment \
  "DISPLAY\
  SSH_ASKPASS\
  SSH_AUTH_SOCK\
  SSH_AGENT_PID\
  SSH_CONNECTION\
  SSH_TTY\
  WINDOWID\
  XAUTHORITY\
  TERM_PROGRAM\
  TERM_PROGRAM_VERSION\
  LC_TERMINAL\
  LC_TERMINAL_VERSION"

bind '$' run "~/.tmux/renew_env.sh"


# ============================
# ===       Plugins        ===
# ============================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'samoshkin/tmux-plugin-sysstat'

# Plugin properties
# Scrub old continuum/resurrect state from already-running tmux servers on reload.
set -gu @continuum-restore
set -gu @continuum-save-interval
set -gu @continuum-save-last-timestamp
set -gu @resurrect-capture-pane-contents
set -gu @resurrect-dir
set -gu @resurrect-restore-script-path
set -gu @resurrect-save-script-path
run-shell -b 'pkill -f "tmux_spinner.sh Restoring..." >/dev/null 2>&1 || true'

set -g @sidebar-tree 't'
set -g @sidebar-tree-focus 'T'
set -g @sidebar-tree-command 'tree -C'

set -g @open-S 'https://www.google.com/search?q='
set-hook -g client-detached 'run-shell -b "~/.tmux/session_snapshot.sh client-detached"'
set-hook -g client-session-changed 'run-shell -b "~/.tmux/session_snapshot.sh client-session-changed"'
set-hook -g pane-exited 'run-shell -b "~/.tmux/session_snapshot.sh pane-exited"'
set-hook -g session-created 'run-shell -b "~/.tmux/session_snapshot.sh session-created"'
set-hook -g session-closed 'run-shell -b "~/.tmux/session_snapshot.sh session-closed"'
set-hook -g session-renamed 'run-shell -b "~/.tmux/session_snapshot.sh session-renamed"'
set-hook -g window-layout-changed 'run-shell -b "~/.tmux/session_snapshot.sh window-layout-changed"'
set-hook -g window-linked 'run-shell -b "~/.tmux/session_snapshot.sh window-linked"'
set-hook -g window-renamed 'run-shell -b "~/.tmux/session_snapshot.sh window-renamed"'
set-hook -g window-unlinked 'run-shell -b "~/.tmux/session_snapshot.sh window-unlinked"'
